  <body>
    <div id="root"></div>
    <script>
      // Apply theme classes immediately to prevent white flash
      (function() {
        var validBases = ['light', 'grey', 'dark'];
        var validAccents = ['green', 'gold'];
        var base = localStorage.getItem('wp-base-theme');
        var accent = localStorage.getItem('wp-accent');
        if (!base || validBases.indexOf(base) === -1) base = 'dark';
        if (!accent || validAccents.indexOf(accent) === -1) accent = 'green';
        document.documentElement.classList.add('base-' + base, 'accent-' + accent);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
